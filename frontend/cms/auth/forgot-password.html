<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GARVI — Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'garvi-orange': '#D58B00',
            'garvi-gold': '#F4A623'
          },
          boxShadow: {
            'card': '0 4px 25px rgba(0,0,0,0.05)'
          }
        }
      }
    }
  </script>
</head>
<body class="h-full flex flex-col justify-center py-12 sm:px-6 lg:px-8 antialiased text-gray-800">
  
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <h2 class="text-3xl font-black text-gray-900 tracking-tight">GARVI</h2>
    <p class="mt-2 text-sm text-gray-600 font-medium">Gujarat Academic Ratings Visualization for Improvement</p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-card">
      
      <div class="mb-6 flex items-center gap-2.5 pb-3 border-b border-gray-100">
        <div class="p-2 bg-amber-50 rounded-lg text-garvi-orange">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m0 0v2m0-2h2m-2 0H10m4-11a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
          </svg>
        </div>
        <div>
          <h3 class="font-bold text-gray-900 text-lg">Trouble Logging In?</h3>
          <p class="text-xs text-gray-500">Enter your User ID to verify your institutional account profile.</p>
        </div>
      </div>

      <form id="forgotForm" class="space-y-5" autocomplete="off">
        <div>
          <label for="uid" class="block text-xs font-bold text-gray-700 uppercase tracking-wider mb-1.5">Institutional User ID</label>
          <div class="relative">
            <input id="uid" type="text" required class="w-full rounded-lg border border-gray-300 bg-white focus:border-garvi-orange focus:ring-2 focus:ring-garvi-orange/20 pl-10 pr-4 py-2 text-sm transition-all shadow-sm" placeholder="e.g., iitgn_admin" />
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
            </div>
          </div>
        </div>

        <div id="infoMessage" class="hidden p-4 rounded-lg text-xs font-medium leading-relaxed border"></div>

        <div>
          <button type="submit" id="submitBtn" class="w-full bg-garvi-orange text-white py-2.5 rounded-lg font-bold hover:bg-orange-600 active:scale-[0.98] transition-all text-sm shadow-sm flex justify-center items-center gap-2">
            Verify Account
          </button>
        </div>
      </form>

      <div class="mt-6 pt-4 border-t border-gray-100 flex justify-center">
        <a href="/cms/auth/login.html" class="text-xs font-bold text-garvi-orange hover:text-orange-700 inline-flex items-center gap-1 transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back to Login
        </a>
      </div>

    </div>
  </div>

  <script>
    document.getElementById('forgotForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('uid').value.trim().toLowerCase();
      const btn = document.getElementById('submitBtn');
      const infoBox = document.getElementById('infoMessage');

      btn.disabled = true; btn.textContent = 'Verifying context…';
      infoBox.classList.add('hidden');

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username })
        });
        const result = await res.json();

        infoBox.classList.remove('hidden');
        if (result.success) {
          infoBox.className = "p-4 rounded-lg text-xs font-medium leading-relaxed border bg-green-50 text-green-800 border-green-200";
          infoBox.innerHTML = `<strong>Account Verified!</strong><br class="mb-1">${result.message}`;
          document.getElementById('uid').disabled = true;
          btn.classList.add('hidden');
        } else {
          infoBox.className = "p-4 rounded-lg text-xs font-medium leading-relaxed border bg-red-50 text-red-800 border-red-200";
          infoBox.innerHTML = `<strong>Verification Failed</strong><br class="mb-1">${result.error}`;
          btn.disabled = false; btn.textContent = 'Verify Account';
        }
      } catch (err) {
        alert('❌ Connection timeout with authentication server.');
        btn.disabled = false; btn.textContent = 'Verify Account';
      }
    });
  </script>
</body>
</html>
