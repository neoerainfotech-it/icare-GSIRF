<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GARVI — Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { 'garvi-orange': '#D58B00', 'garvi-gold': '#F4A623' } } }
    };
  </script>
  <style>
    body { box-sizing: border-box; }
    .fade-in { opacity: 0; transform: translateY(20px); animation: fadeInUp 0.6s ease forwards; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .floating-shape { position: absolute; opacity: 0.05; animation: float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0)}50%{transform:translateY(-15px)} }

    .role-btn { transition: all 0.2s ease; }
    .role-btn.active {
      background: linear-gradient(135deg, #D58B00, #F4A623);
      color: white;
      box-shadow: 0 4px 12px rgba(213,139,0,0.35);
      border-color: transparent;
    }
    .role-btn:not(.active) {
      background: #f9fafb;
      color: #374151;
      border: 2px solid #e5e7eb;
    }
  </style>
</head>
<body class="min-h-screen bg-gray-50 relative overflow-x-hidden font-sans flex flex-col justify-between">

  <!-- Floating background graphics -->
  <div class="absolute inset-0 -z-10 pointer-events-none">
    <div class="floating-shape w-16 h-16 sm:w-24 sm:h-24 bg-garvi-orange rounded-full top-20 left-4 sm:left-10"></div>
    <div class="floating-shape w-12 h-12 sm:w-16 sm:h-16 bg-garvi-gold rounded-lg bottom-32 right-6 sm:right-16" style="animation-delay:1s"></div>
  </div>

  <!-- Top Header Navigation Bar (Updated to clean /landing route) -->
  <header class="bg-white shadow-md fixed top-0 inset-x-0 z-50">
    <div class="max-w-7xl mx-auto flex items-center justify-between h-16 px-4 sm:px-6">
      <div class="flex items-center gap-2 sm:gap-3">
        <a href="/landing" class="flex items-center gap-2 sm:gap-3">
          <img src="https://i.im.ge/2025/10/14/ngltcP.GARVI-symbol.png" alt="GARVI logo" class="h-10 w-10 sm:h-12 sm:w-12 object-contain" />
          <h1 class="text-xl sm:text-2xl font-bold text-garvi-orange">GARVI</h1>
        </a>
        <span class="text-sm sm:text-base text-gray-400 ml-1">/ Login</span>
      </div>
      <a href="/landing" class="text-xs sm:text-sm text-gray-500 hover:text-garvi-orange transition-colors flex items-center gap-1">
        ← <span class="hidden xs:inline">Back to </span>Home
      </a>
    </div>
  </header>

  <!-- Centered Login Card -->
  <div class="flex-grow pt-24 pb-28 flex items-center justify-center px-4 w-full">
    <div class="w-full max-w-md bg-white shadow-xl sm:shadow-2xl rounded-2xl p-6 sm:p-8 fade-in">

      <div class="text-center mb-6">
        <img src="https://i.im.ge/2025/10/14/ngltcP.GARVI-symbol.png" alt="GARVI Symbol" class="mx-auto h-16 sm:h-20 mb-2" />
        <h2 class="text-2xl sm:text-3xl font-bold text-gray-900">Sign In</h2>
        <p class="text-gray-500 text-xs sm:text-sm mt-1">Select your role and enter your credentials</p>
      </div>

      <!-- Role Switcher -->
      <div class="mb-6">
        <label class="block text-sm font-semibold text-gray-700 mb-2 text-center">Login As</label>
        <div class="grid grid-cols-2 gap-3">
          <button type="button" id="roleInstitute" class="role-btn active rounded-xl py-2.5 sm:py-3 px-3 sm:px-4 font-semibold text-xs sm:text-sm flex flex-col items-center gap-1.5" onclick="selectRole('institute')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
            </svg>
            Institute
          </button>
          <button type="button" id="roleAdmin" class="role-btn rounded-xl py-2.5 sm:py-3 px-3 sm:px-4 font-semibold text-xs sm:text-sm flex flex-col items-center gap-1.5" onclick="selectRole('admin')">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
            </svg>
            Admin
          </button>
        </div>
        <p id="roleDesc" class="text-xs text-center mt-2 text-garvi-orange font-medium">
          Logging in as: <span id="roleLabel">Institute (Dashboard Access)</span>
        </p>
      </div>

      <!-- Credentials Form -->
      <form id="loginForm" class="space-y-4">
        <input type="hidden" id="selectedRole" value="institute" />

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input type="text" id="username" required
            class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm sm:text-base focus:ring-2 focus:ring-garvi-orange/40 focus:border-garvi-orange outline-none"
            placeholder="you@institution.edu.in" />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input type="password" id="password" required
              class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-sm sm:text-base focus:ring-2 focus:ring-garvi-orange/40 focus:border-garvi-orange outline-none pr-10"
              placeholder="••••••••" />
            <button type="button" id="togglePwd" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-garvi-orange focus:outline-none">
              <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path d="M2.458 12C3.732 7.943 7.523 5 12 5s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7s-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="flex items-center text-xs sm:text-sm">
          <label class="flex items-center gap-2 cursor-pointer select-none text-gray-600">
            <input type="checkbox" id="rememberMe" class="text-garvi-orange focus:ring-garvi-orange border-gray-300 rounded" />
            Remember me
          </label>
        </div>

        <button type="submit"
          class="w-full py-2.5 sm:py-3 rounded-lg bg-gradient-to-r from-garvi-orange to-garvi-gold text-white font-semibold hover:shadow-lg transition-all text-sm sm:text-base mt-2">
          Sign In
        </button>
      </form>

      <div id="msg" class="hidden mt-5 text-center py-2.5 rounded-lg text-white text-xs sm:text-sm font-medium px-3 break-words"></div>
    </div>
  </div>

  <!-- Support Footer Dock -->
  <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-xl z-40">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4 w-full sm:w-auto justify-between sm:justify-start">
          <div class="flex items-center gap-2">
            <svg class="w-5 h-5 text-garvi-orange shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span class="font-semibold text-gray-800 text-xs sm:text-sm">Need Help?</span>
          </div>
          <div class="hidden md:flex items-center gap-5 text-xs sm:text-sm text-gray-600">
            <a href="#contact" class="hover:text-garvi-orange transition-colors flex items-center gap-1">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              support@garvi.gujarat.gov.in
            </a>
            <a href="#phone" class="hover:text-garvi-orange transition-colors flex items-center gap-1">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
              +91-79-1234-5678
            </a>
            <a href="#guide" class="hover:text-garvi-orange transition-colors flex items-center gap-1">
              <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
              User Guide
            </a>
          </div>
        </div>
        <button id="helpToggle" class="md:hidden text-garvi-orange p-1.5 hover:bg-gray-100 rounded-lg transition-colors focus:outline-none" aria-label="Toggle support details">
          <svg id="helpToggleIcon" class="w-5 h-5 transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/>
          </svg>
        </button>
      </div>
      <!-- Mobile Expandable Support Details -->
      <div id="mobileHelp" class="hidden md:hidden mt-2 pt-3 border-t border-gray-200 flex flex-col gap-2.5 text-xs sm:text-sm">
        <a href="#contact" class="flex items-center gap-2 text-gray-600 hover:text-garvi-orange py-1">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 4.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Email: support@garvi.gujarat.gov.in
        </a>
        <a href="#phone" class="flex items-center gap-2 text-gray-600 hover:text-garvi-orange py-1">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
          Phone: +91-79-1234-5678
        </a>
        <a href="#guide" class="flex items-center gap-2 text-gray-600 hover:text-garvi-orange py-1">
          <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.746 0 3.332.477 4.5 1.253v13C19.832 18.477 18.246 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/></svg>
          User Guide & Documentation
        </a>
      </div>
    </div>
  </footer>

  <script>
    const roleDescriptions = {
      institute: 'Institute (Dashboard Access)',
      admin:     'Admin (Admin Portal Access)'
    };

    function selectRole(role) {
      document.getElementById('selectedRole').value = role;
      document.getElementById('roleLabel').textContent = roleDescriptions[role];
      document.getElementById('roleInstitute').classList.toggle('active', role === 'institute');
      document.getElementById('roleAdmin').classList.toggle('active', role === 'admin');
      
      document.getElementById('username').value = '';
      document.getElementById('password').value = '';
      
      document.getElementById('username').placeholder =
        role === 'admin' ? 'admin@garvi.gujarat.gov.in' : 'you@institution.edu.in';
    }

    // Password visibility toggle
    const pwd = document.getElementById('password');
    document.getElementById('togglePwd').addEventListener('click', () => {
      const show = pwd.type === 'password';
      pwd.type = show ? 'text' : 'password';
      document.getElementById('eyeIcon').innerHTML = show
        ? `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L9.88 9.88" />`
        : `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />`;
    });

    // Node.js API Login Form Submission Pipeline
    document.getElementById('loginForm').addEventListener('submit', async e => {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = pwd.value.trim();
      const role = document.getElementById('selectedRole').value;

      if (!username || !password) {
        showMsg('❌ Please fill in all fields.', 'bg-red-500');
        return;
      }

      const btn = document.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Signing in…';
      btn.classList.add('opacity-75', 'cursor-not-allowed');

      try {
        // Updated to use dynamic relative routing path
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, role })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.message || 'Authentication rejected.');
        }

        // Assemble combined session object safely
        const combinedSession = {
          token: data.token,
          user: data.user,
          userId: data.user?.id || null,
          username: username
        };
        localStorage.setItem('garvi_session', JSON.stringify(combinedSession));
        
        // Retain backups for validation compatibility across route guards
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showMsg('✅ Authentication verified! Redirecting...', 'bg-green-500');

        // Redirecting flawlessly to extensionless server route domains
        setTimeout(() => {
          if (data.user.role === 'admin') {
            window.location.href = '/admin'; 
          } else {
            window.location.href = '/dashboard'; 
          }
        }, 1200);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Sign In';
        btn.classList.remove('opacity-75', 'cursor-not-allowed');
        showMsg(`❌ ${err.message}`, 'bg-red-500');
      }
    });

    function showMsg(text, bgClass) {
      const msg = document.getElementById('msg');
      msg.textContent = text;
      msg.className = `mt-5 text-center py-2.5 rounded-lg text-white text-xs sm:text-sm font-medium ${bgClass} px-3 break-words`;
      msg.classList.remove('hidden');
    }

    // Mobile Footer Toggle
    document.getElementById('helpToggle').addEventListener('click', () => {
      const mh = document.getElementById('mobileHelp');
      const icon = document.getElementById('helpToggleIcon');
      const isHidden = mh.classList.toggle('hidden');
      icon.style.transform = isHidden ? 'rotate(0deg)' : 'rotate(180deg)';
    });

    // Help bar event interceptors
    document.querySelectorAll('a[href^="#"]').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        const h = link.getAttribute('href');
        if (h === '#contact') window.open('mailto:support@garvi.gujarat.gov.in?subject=GARVI Login Support', '_blank');
        else if (h === '#phone') alert('📞 GARVI Support\nPhone: +91-79-1234-5678\nMon–Fri, 9 AM–6 PM');
        else if (h === '#guide') alert('📚 User Guide\n• Login help\n• Account setup\n• Feature tutorials\n• FAQ');
      });
    });
  </script>
</body>
</html>
